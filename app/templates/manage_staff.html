{% extends "base.html" %}

{% block title %}Manage Staff - Magic Tales{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold text-gray-800">Staff Management</h1>
    <button onclick="toggleUserModal()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl shadow-lg transition-all flex items-center gap-2">
        <i class="fa-solid fa-user-plus"></i> Add New Staff
    </button>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50 text-gray-600 uppercase text-sm">
            <tr>
                <th class="px-6 py-4 font-semibold">Username</th>
                <th class="px-6 py-4 font-semibold">Role</th>
                <th class="px-6 py-4 font-semibold text-center">Actions</th>
            </tr>
        </thead>
        <tbody id="staff-table-body" class="divide-y divide-gray-100 text-gray-700">
            <tr>
                <td colspan="3" class="px-6 py-10 text-center text-gray-400 italic">Loading staff data...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md transform transition-all">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Add New Staff</h2>
      <button onclick="toggleUserModal()" class="text-gray-400 hover:text-gray-600">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <form id="userForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="new_username" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="new_password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition">
      </div>

      <div class="pt-4">
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition">
          Create Account
        </button>
      </div>
    </form>
  </div>
</div>


{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/staff.js') }}"></script>
{% endblock %}
