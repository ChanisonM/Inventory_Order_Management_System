{% extends "base.html" %} {% block title %} Deshboard - Store Management
{% endblock %} 
{% block content %}

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 transition-transform hover:scale-105">
        <div class="p-3 bg-blue-50 rounded-xl text-blue-600">
            <i class="fa-solid fa-boxes-stacked text-2xl"></i>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-500">Total Products</p>
            <h3 class="text-2xl font-bold text-gray-800">{{ total_products }}</h3>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 transition-transform hover:scale-105">
        <div class="p-3 bg-red-50 rounded-xl text-red-600">
            <i class="fa-solid fa-triangle-exclamation text-2xl animate-pulse"></i>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-500">Low Stock</p>
            <h3 class="text-2xl font-bold text-red-600">{{ low_stock_count }}</h3>
            <a href="{{ url_for('api.low_inventory', filter='low_stock') }}" class="text-xs text-blue-500 hover:underline">
                View All <i class="fa-solid fa-chevron-right ml-1"></i>
            </a>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 transition-transform hover:scale-105">
        <div class="p-3 bg-green-50 rounded-xl text-green-600">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-500">Today's Orders</p>
            <h3 class="text-2xl font-bold text-gray-800">0</h3> </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 transition-transform hover:scale-105">
        <div class="p-3 bg-purple-50 rounded-xl text-purple-600">
            <i class="fa-solid fa-users-gear text-2xl"></i>
        </div>
        <div>
            <p class="text-sm font-medium text-gray-500">Active Staff</p>
            <h3 class="text-2xl font-bold text-gray-800">{{ total_staff }}</h3>
        </div>
    </div>

</div>

{% endblock %}
