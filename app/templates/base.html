<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Magic Tales Inventory{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-100 font-sans">

    {% if current_user.is_authenticated %}
    <nav class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/api/dashboard'">
            <i class="fa-solid fa-dragon text-blue-600 text-2xl"></i>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                Magic Tales Inventory
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-gray-700 font-medium">Hello , {{ current_user.username }}</span>
            <a href="{{ url_for('api.logout') }}" class="text-red-500 hover:text-red-700 transition flex items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>
    {% endif %}

    <div class="container mx-auto">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}
    <script src="../static/js/dashboard.js"></script>
    {% endblock %}
</body>
</html>
